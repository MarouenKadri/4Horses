name: flutter_application_1
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  provider: ^6.1.0


  # ✅ Localisation et internationalisation
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # ✅ Autres dépendances
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.10.1
  flutter_dotenv: ^5.2.1
  image_picker: ^1.1.1
  http: ^1.5.0
  google_sign_in: ^6.2.1
  uuid: ^4.4.0
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  url_launcher: ^6.3.0
  flutter_stripe: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#10242E"
  adaptive_icon_foreground: "assets/icon/app_icon_fg.png"
  web:
    generate: false

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/splash/splash_logo.png"
  color_dark: "#10242E"
  image_dark: "assets/splash/splash_logo_dark.png"
  android_12:
    image: "assets/splash/splash_logo.png"
    icon_background_color: "#FFFFFF"
    image_dark: "assets/splash/splash_logo_dark.png"
    icon_background_color_dark: "#10242E"
  ios: true
  android: true
  web: false

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/icon/
    - assets/splash/
